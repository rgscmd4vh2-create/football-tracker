<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>足球打卡</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  background: #f5f5f0;
  color: #2c2c2c;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

.container { width: 100%; max-width: 420px; padding: 20px 16px 100px; }

/* Header */
header { text-align: center; margin-bottom: 24px; }
.nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 8px;
}
.nav-btn {
  width: 40px; height: 40px; border: none; background: #fff;
  border-radius: 50%; font-size: 22px; color: #555;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: background 0.15s;
}
.nav-btn:active { background: #e8e8e0; }
#title { font-size: 20px; font-weight: 600; min-width: 120px; }
.stats {
  font-size: 14px; color: #888;
}
.stats strong { color: #4a8c3f; font-size: 22px; font-weight: 700; }

/* Weekday row */
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 6px;
  padding: 0 4px;
}

/* Calendar grid */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  background: #fff;
  border-radius: 16px;
  padding: 12px 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.day-cell {
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 500;
  color: #333;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
}
.day-cell:active { background: #f0f0eb; }
.day-cell.empty { cursor: default; }
.day-cell.empty:active { background: transparent; }
.day-cell.future { color: #ccc; cursor: default; }
.day-cell.future:active { background: transparent; }

.day-cell .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #4a8c3f;
  margin-top: 2px;
  transition: transform 0.15s, opacity 0.15s;
}
.day-cell .dot.hidden { opacity: 0; transform: scale(0); }

.day-cell.today {
  background: #f0f7ed;
  font-weight: 700;
}
.day-cell.today .date-num {
  color: #4a8c3f;
}

/* Year view */
.year-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.mini-month {
  background: #fff;
  border-radius: 12px;
  padding: 10px 8px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.04);
  cursor: pointer;
  transition: transform 0.15s;
}
.mini-month:active { transform: scale(0.97); }
.mini-month-name {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: #555;
  margin-bottom: 8px;
}
.mini-cal {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.mini-cell {
  aspect-ratio: 1 / 1;
  border-radius: 3px;
  background: #f5f5f0;
}
.mini-cell.filled { background: #4a8c3f; }
.mini-cell.empty-bg { background: transparent; }

.mini-month-stats {
  text-align: center;
  font-size: 11px;
  color: #999;
  margin-top: 6px;
}

.year-label {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* Footer */
footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center; gap: 0;
  padding: 12px 16px 28px;
  background: linear-gradient(to top, rgba(245,245,240,1) 60%, rgba(245,245,240,0));
}
.view-toggle {
  border: none; background: #fff;
  padding: 10px 32px;
  font-size: 15px; font-weight: 500;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
}
.view-toggle:first-child { border-radius: 20px 0 0 20px; }
.view-toggle:last-child { border-radius: 0 20px 20px 0; }
.view-toggle.active {
  background: #4a8c3f;
  color: #fff;
  box-shadow: 0 2px 8px rgba(74,140,63,0.3);
}

.hidden { display: none !important; }

/* Year nav */
.year-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}
.year-nav .nav-btn { width: 34px; height: 34px; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="nav">
      <button class="nav-btn" id="prevBtn" aria-label="上个月">‹</button>
      <h1 id="title"></h1>
      <button class="nav-btn" id="nextBtn" aria-label="下个月">›</button>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <main>
    <div id="monthView">
      <div class="weekdays">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="yearView" class="hidden">
      <div class="year-nav">
        <button class="nav-btn" id="yearPrevBtn" aria-label="上一年">‹</button>
        <span class="year-label" id="yearLabel"></span>
        <button class="nav-btn" id="yearNextBtn" aria-label="下一年">›</button>
      </div>
      <div class="year-grid" id="yearGrid"></div>
    </div>
  </main>

  <footer>
    <button class="view-toggle active" id="monthToggle">月视图</button>
    <button class="view-toggle" id="yearToggle">年视图</button>
  </footer>
</div>

<script>
(function() {
  var STORAGE_KEY = 'football_days';

  // State
  var currentYear, currentMonth, viewMode;
  var soccerDays = {};

  // Helpers
  function dateKey(y, m, d) {
    return y + '-' + pad(m + 1) + '-' + pad(d);
  }
  function pad(n) { return (n < 10 ? '0' : '') + n; }

  function hasSoccer(y, m, d) { return soccerDays[dateKey(y, m, d)] === true; }

  function toggleSoccer(y, m, d) {
    var key = dateKey(y, m, d);
    if (soccerDays[key]) {
      delete soccerDays[key];
    } else {
      soccerDays[key] = true;
    }
    saveData();
    render();
  }

  function countMonthSoccer(y, m) {
    var count = 0;
    for (var i = 1; i <= daysInMonth(y, m); i++) {
      if (hasSoccer(y, m, i)) count++;
    }
    return count;
  }

  function countYearSoccer(y) {
    var count = 0;
    for (var key in soccerDays) {
      if (soccerDays[key] && key.indexOf(y + '-') === 0) count++;
    }
    return count;
  }

  function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

  function firstDayOffset(y, m) {
    // 0=Sunday ... 6=Saturday → 0=Monday ... 6=Sunday
    var d = new Date(y, m, 1).getDay();
    return d === 0 ? 6 : d - 1;
  }

  function getToday() {
    var now = new Date();
    return { year: now.getFullYear(), month: now.getMonth(), day: now.getDate() };
  }

  function isFuture(y, m, d) {
    var today = getToday();
    if (y > today.year) return true;
    if (y === today.year && m > today.month) return true;
    if (y === today.year && m === today.month && d > today.day) return true;
    return false;
  }

  // Storage
  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var arr = JSON.parse(raw);
        soccerDays = {};
        for (var i = 0; i < arr.length; i++) {
          soccerDays[arr[i]] = true;
        }
      }
    } catch(e) { soccerDays = {}; }
  }

  function saveData() {
    try {
      var arr = [];
      for (var key in soccerDays) {
        if (soccerDays[key]) arr.push(key);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    } catch(e) {}
  }

  // Render month view
  function renderMonthView() {
    var title = document.getElementById('title');
    var stats = document.getElementById('stats');
    var grid = document.getElementById('calendarGrid');
    var today = getToday();

    title.textContent = currentYear + '年' + (currentMonth + 1) + '月';

    var count = countMonthSoccer(currentYear, currentMonth);
    var total = daysInMonth(currentYear, currentMonth);
    stats.innerHTML = '本月踢球 <strong>' + count + '</strong> / ' + total + ' 天';

    var offset = firstDayOffset(currentYear, currentMonth);
    var totalDays = daysInMonth(currentYear, currentMonth);

    var html = '';
    // Empty cells before month start
    for (var i = 0; i < offset; i++) {
      html += '<div class="day-cell empty"></div>';
    }
    // Day cells
    for (var d = 1; d <= totalDays; d++) {
      var cls = 'day-cell';
      if (currentYear === today.year && currentMonth === today.month && d === today.day) {
        cls += ' today';
      }
      if (isFuture(currentYear, currentMonth, d)) {
        cls += ' future';
      }
      var sport = hasSoccer(currentYear, currentMonth, d);
      html += '<div class="' + cls + '" data-day="' + d + '">';
      html += '<span class="date-num">' + d + '</span>';
      html += '<span class="dot' + (sport ? '' : ' hidden') + '"></span>';
      html += '</div>';
    }

    grid.innerHTML = html;

    // Click handlers
    var cells = grid.querySelectorAll('.day-cell:not(.empty):not(.future)');
    for (var j = 0; j < cells.length; j++) {
      cells[j].addEventListener('click', (function(d) {
        return function() { toggleSoccer(currentYear, currentMonth, d); };
      })(parseInt(cells[j].getAttribute('data-day'))));
    }
  }

  // Render year view
  function renderYearView() {
    var label = document.getElementById('yearLabel');
    var grid = document.getElementById('yearGrid');

    label.textContent = currentYear + '年';

    var html = '';
    for (var m = 0; m < 12; m++) {
      var count = countMonthSoccer(currentYear, m);
      var offset = firstDayOffset(currentYear, m);
      var totalDays = daysInMonth(currentYear, m);

      html += '<div class="mini-month" data-month="' + m + '">';
      html += '<div class="mini-month-name">' + (m + 1) + '月</div>';
      html += '<div class="mini-cal">';

      // Padding cells
      for (var p = 0; p < offset; p++) {
        html += '<div class="mini-cell empty-bg"></div>';
      }
      // Day cells
      for (var d = 1; d <= totalDays; d++) {
        html += '<div class="mini-cell' + (hasSoccer(currentYear, m, d) ? ' filled' : '') + '"></div>';
      }

      html += '</div>';
      html += '<div class="mini-month-stats">' + count + '天</div>';
      html += '</div>';
    }

    grid.innerHTML = html;

    // Click handlers
    var months = grid.querySelectorAll('.mini-month');
    for (var j = 0; j < months.length; j++) {
      months[j].addEventListener('click', (function(m) {
        return function() {
          currentMonth = m;
          viewMode = 'month';
          render();
        };
      })(parseInt(months[j].getAttribute('data-month'))));
    }
  }

  // Main render
  function render() {
    var monthView = document.getElementById('monthView');
    var yearView = document.getElementById('yearView');
    var monthToggle = document.getElementById('monthToggle');
    var yearToggle = document.getElementById('yearToggle');
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');

    if (viewMode === 'month') {
      monthView.classList.remove('hidden');
      yearView.classList.add('hidden');
      monthToggle.classList.add('active');
      yearToggle.classList.remove('active');
      prevBtn.style.visibility = '';
      nextBtn.style.visibility = '';
      renderMonthView();
    } else {
      monthView.classList.add('hidden');
      yearView.classList.remove('hidden');
      monthToggle.classList.remove('active');
      yearToggle.classList.add('active');
      prevBtn.style.visibility = 'hidden';
      nextBtn.style.visibility = 'hidden';
      renderYearView();
    }
  }

  // Navigation
  function prevMonth() {
    if (currentMonth === 0) { currentYear--; currentMonth = 11; }
    else { currentMonth--; }
    render();
  }

  function nextMonth() {
    if (currentMonth === 11) { currentYear++; currentMonth = 0; }
    else { currentMonth++; }
    render();
  }

  function prevYear() { currentYear--; render(); }
  function nextYear() { currentYear++; render(); }

  // Init
  function init() {
    loadData();
    var today = getToday();
    currentYear = today.year;
    currentMonth = today.month;
    viewMode = 'month';

    document.getElementById('prevBtn').addEventListener('click', prevMonth);
    document.getElementById('nextBtn').addEventListener('click', nextMonth);
    document.getElementById('yearPrevBtn').addEventListener('click', prevYear);
    document.getElementById('yearNextBtn').addEventListener('click', nextYear);

    document.getElementById('monthToggle').addEventListener('click', function() {
      viewMode = 'month'; render();
    });
    document.getElementById('yearToggle').addEventListener('click', function() {
      viewMode = 'year'; render();
    });

    // Swipe support
    var touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - touchStartX;
      var dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;
      if (viewMode === 'month') {
        if (dx < 0) nextMonth(); else prevMonth();
      } else {
        if (dx < 0) nextYear(); else prevYear();
      }
    });

    render();
  }

  init();
})();
</script>
</body>
</html>
